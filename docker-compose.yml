version: "3.8"

services:
    mc:
        image: itzg/minecraft-server
        container_name: mc
        ports:
            - 25565:25565
            - 8100:8100
            - 8123:8123
        environment:
            EULA: "TRUE"
            VERSION: "LATEST"
            MEMORY: "32G"
            VIEW_DISTANCE: 16
            TYPE: "PAPER"
        tty: true
        stdin_open: true
        restart: unless-stopped
        volumes:
            - ./server:/data
